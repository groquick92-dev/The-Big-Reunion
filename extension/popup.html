<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>The Big Reunion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      font-size: 13px;
    }

    .header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 12px 16px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon { font-size: 22px; }
    .header-title { font-size: 14px; font-weight: 700; color: #f1f5f9; }
    .header-sub { font-size: 11px; color: #94a3b8; margin-top: 1px; }

    .status-bar {
      padding: 8px 16px;
      font-size: 12px;
      color: #94a3b8;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-bar .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #64748b; flex-shrink: 0;
    }
    .status-bar.loading .dot { background: #f59e0b; animation: pulse 1s infinite; }
    .status-bar.ok .dot { background: #22c55e; }
    .status-bar.error .dot { background: #ef4444; }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .form { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label {
      font-size: 11px; font-weight: 600; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .field input, .field textarea {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f1f5f9;
      padding: 7px 10px;
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus { border-color: #f59e0b; }
    .field textarea { resize: vertical; min-height: 60px; }
    .field input[type="number"] { -moz-appearance: textfield; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .source-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #f59e0b20; border: 1px solid #f59e0b40;
      color: #fbbf24; border-radius: 4px;
      padding: 2px 8px; font-size: 11px; font-weight: 600;
    }

    .btn-row { display: flex; gap: 8px; padding: 0 16px 14px; }

    .btn {
      flex: 1; padding: 9px; border-radius: 7px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #0f1117;
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: #1e293b; color: #94a3b8;
      border: 1px solid #334155;
    }

    .toast {
      margin: 0 16px 12px; padding: 10px 12px; border-radius: 7px;
      font-size: 12px; display: none;
    }
    .toast.success { background: #14532d40; border: 1px solid #22c55e60; color: #4ade80; }
    .toast.error { background: #450a0a40; border: 1px solid #ef444460; color: #f87171; }

    .settings-hint {
      padding: 0 16px 10px;
      font-size: 11px; color: #64748b; text-align: center;
    }
    .settings-hint a { color: #f59e0b; text-decoration: none; cursor: pointer; }
    .settings-hint a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏡</div>
  <div>
    <div class="header-title">The Big Reunion</div>
    <div class="header-sub">Capturer cette annonce de gîte</div>
  </div>
</div>

<div class="status-bar loading" id="status-bar">
  <div class="dot"></div>
  <span id="status-text">Analyse de la page en cours…</span>
</div>

<div class="form" id="form-container">
  <div class="field">
    <label>Nom du gîte *</label>
    <input type="text" id="f-nom" placeholder="Ex: Le Grand Domaine des Charmes">
  </div>

  <div class="field">
    <label>URL de l'annonce</label>
    <input type="url" id="f-url" placeholder="https://...">
  </div>

  <div class="row">
    <div class="field">
      <label>Capacité (pers.)</label>
      <input type="number" id="f-capacite" min="1" max="200" placeholder="20">
    </div>
    <div class="field">
      <label>Prix / semaine (€)</label>
      <input type="number" id="f-prix" min="0" placeholder="3500">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Localisation</label>
      <input type="text" id="f-localisation" placeholder="Ex: Dordogne (24)">
    </div>
    <div class="field">
      <label>Département (code)</label>
      <input type="text" id="f-departement" placeholder="Ex: 24">
    </div>
  </div>

  <div class="field">
    <label>Photo (URL)</label>
    <input type="url" id="f-photo" placeholder="https://...">
  </div>

  <div class="field">
    <label>Description (optionnelle)</label>
    <textarea id="f-description" placeholder="Notes personnelles sur ce gîte…"></textarea>
  </div>

  <div style="display:flex; align-items:center; gap:8px; padding-top:2px;">
    <span class="source-badge">✍️ Ajout Manuel</span>
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:#94a3b8;">
      <input type="checkbox" id="f-animaux" style="accent-color:#f59e0b;">
      Animaux acceptés
    </label>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="btn-row">
  <button class="btn btn-secondary" id="btn-clear" onclick="clearForm()">↺ Vider</button>
  <button class="btn btn-primary" id="btn-submit" onclick="submitGite()">
    ➕ Ajouter au tableau de bord
  </button>
</div>

<div class="settings-hint">
  Serveur: <span id="server-url-hint">…</span> —
  <a onclick="chrome.runtime.openOptionsPage()">⚙️ Paramètres</a>
</div>

<script src="popup.js"></script>
</body>
</html>
